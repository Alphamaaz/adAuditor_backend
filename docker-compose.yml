services:
  # 1. Frontend (Next.js) - Mapping to 3050
  frontend:
    build:
      context: ../ad-auditor-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.adadviser.uk
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    restart: always
    ports:
      - "3050:3000"
    networks:
      - app-network

  # 2. Backend (Express API) - Mapping to 5050
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5050:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://adauditor:your_secure_password@db:5432/adauditor?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - NODE_ENV=production
      - SESSION_SECRET=change_me_to_a_long_random_string
      - JWT_SECRET=change_me_to_a_long_random_string
      - APP_URL=https://adadviser.uk
      - API_URL=https://api.adadviser.uk
      # Storage: mount a named volume so generated PDFs + uploads survive
      # container restarts (otherwise they vanish on every redeploy).
      - STORAGE_ROOT=/data/storage
      - STORAGE_PERSISTENT=true
      - PDF_STORAGE_DIR=/data/storage/pdf-reports
      - UPLOAD_DIR=/data/storage/uploads
    volumes:
      - backend_storage:/data/storage
    depends_on:
      - db
      - redis
    networks:
      - app-network

  # 3. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=adauditor
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=adauditor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # 4. Cache (Redis)
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_storage:
