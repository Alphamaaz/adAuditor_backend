services:
  # 1. Frontend (Next.js) - Mapping to 3050
  frontend:
    build:
      context: ../adAuditor_frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3050:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.adadviser.uk
    networks:
      - app-network

  # 2. Backend (Express API) - Mapping to 5050
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5050:5000"
    environment:
      - DATABASE_URL=postgresql://adauditor:your_secure_password@db:5432/adauditor?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
      - NODE_ENV=production
      - SESSION_SECRET=change_me_to_a_long_random_string
      - JWT_SECRET=change_me_to_a_long_random_string
      - APP_URL=https://adadviser.uk
      - API_URL=https://api.adadviser.uk
    depends_on:
      - db
      - redis
    networks:
      - app-network

  # 3. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=adauditor
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=adauditor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # 4. Cache (Redis)
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
